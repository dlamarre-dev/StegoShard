<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="google-site-verification" content="6Ds3RKHLz46hfpQwb__ZTQ0Tuk_0d2ZMGwfy6S0WJ9s" />
    <title>StegoShard — encrypt files into resilient images</title>
    <meta
      name="description"
      content="Encrypt a file into robust, error-corrected images you can store on disk or print. Open source, offline, nothing leaves your device."
    />
    <link rel="icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="../ui/ui.css" />
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <img class="logo" src="./icons/icon.svg" alt="" />
        <div class="brand-name">StegoShard</div>
      </div>
      <div class="appbar-actions">
        <button id="workflows-btn" class="btn-ghost" data-i18n="btnWorkflows" hidden></button>
        <select id="lang-select" class="lang-select" aria-label="Language"></select>
        <a class="btn-ghost" href="https://github.com/dlamarre-dev/StegoShard">GitHub</a>
      </div>
    </header>

    <main class="app">
      <section class="card banner">
        <p class="banner-lead" data-i18n="popupTagline"></p>
        <p class="lead" data-i18n="webIntro"></p>
      </section>

      <!-- Launch chooser: pick a workflow. -->
      <section id="chooser" class="card banner" hidden>
        <h2 data-i18n="chooserTitle"></h2>
        <p class="lead" data-i18n="chooserBody"></p>
        <div class="chooser-grid">
          <button id="choose-guided" class="chooser-card" type="button">
            <span class="chooser-card-title" data-i18n="workflowGuided"></span>
            <span class="chooser-card-desc muted" data-i18n="workflowGuidedDesc"></span>
            <span id="rec-guided" class="pill pill-ok" data-i18n="workflowRecommended" hidden></span>
          </button>
          <button id="choose-expert" class="chooser-card" type="button">
            <span class="chooser-card-title" data-i18n="workflowExpert"></span>
            <span class="chooser-card-desc muted" data-i18n="workflowExpertDesc"></span>
            <span id="rec-expert" class="pill pill-ok" data-i18n="workflowRecommended" hidden></span>
          </button>
        </div>
      </section>

      <!-- Guided workflow mounts here. -->
      <div id="wizard-root" hidden></div>

      <div id="expert-view" class="grid" hidden>
        <section class="card">
          <div class="card-head"><h2 data-i18n="saveHeading"></h2></div>

          <div id="file-drop" class="dropzone" tabindex="0" role="button">
            <svg
              class="dz-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 16V4M7 9l5-5 5 5" />
              <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3" />
            </svg>
            <span class="dz-prompt">
              <span class="dz-title" data-i18n="dropTitle"></span><br />
              <span class="muted" data-i18n="dropPrompt"></span>
            </span>
            <span id="dz-file" class="dz-file"></span>
            <input id="save-file" type="file" />
          </div>
          <p id="estimate-line" class="muted estimate-line">
            <span data-i18n="estimateImages"></span> <span id="estimate" class="badge">—</span>
          </p>

          <input
            id="save-pw"
            type="password"
            autocomplete="new-password"
            data-i18n-placeholder="labelPassword"
          />

          <details class="advanced">
            <summary data-i18n="advancedOptions"></summary>

            <label class="muted" data-i18n="destHeading"></label>
            <fieldset class="segmented">
              <label
                ><input type="radio" name="dest" value="disk" checked /><span
                  data-i18n="destDisk"
                ></span
              ></label>
              <label
                ><input type="radio" name="dest" value="paper" /><span data-i18n="destPaper"></span
              ></label>
              <label
                ><input type="radio" name="dest" value="binary" /><span
                  data-i18n="destBinary"
                ></span
              ></label>
              <label
                ><input type="radio" name="dest" value="sqlite" /><span
                  data-i18n="destSqlite"
                ></span
              ></label>
              <label
                ><input type="radio" name="dest" value="gallery" /><span
                  data-i18n="destGallery"
                ></span
              ></label>
            </fieldset>

            <div id="keymode-fields">
              <label class="muted" data-i18n="keyModeHeading"></label>
              <fieldset class="segmented">
                <label
                  ><input type="radio" name="keymode" value="embedded" checked /><span
                    data-i18n="keyModeEmbedded"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="keymode" value="keyfile" /><span
                    data-i18n="keyModeKeyfile"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="keymode" value="stego" /><span
                    data-i18n="keyModeStego"
                  ></span
                ></label>
              </fieldset>
              <details class="why">
                <summary data-i18n="whyLabel"></summary>
                <p data-i18n="keyModeHelp"></p>
              </details>
            </div>

            <div id="gallery-fields" hidden>
              <p class="muted" data-i18n="galleryIntro"></p>
              <div id="gallery-covers-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
                <span class="dz-prompt">
                  <span class="dz-title" data-i18n="galleryCoversTitle"></span><br />
                  <span class="muted" data-i18n="dropPrompt"></span>
                </span>
                <span id="gallery-covers-name" class="dz-file"></span>
                <input id="gallery-covers" type="file" accept="image/png,image/jpeg" multiple />
              </div>
              <p class="muted" data-i18n="galleryPasswordHint"></p>

              <label class="muted" data-i18n="keyModeHeading"></label>
              <fieldset class="segmented">
                <label
                  ><input type="radio" name="gallery-keymode" value="embedded" checked /><span
                    data-i18n="keyModeEmbedded"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="gallery-keymode" value="keyfile" /><span
                    data-i18n="keyModeKeyfile"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="gallery-keymode" value="stego" /><span
                    data-i18n="keyModeStego"
                  ></span
                ></label>
              </fieldset>
              <div id="gallery-stego-fields" hidden>
                <div id="gallery-cover-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
                  <span class="dz-prompt">
                    <span class="dz-title" data-i18n="coverTitle"></span><br />
                    <span class="muted" data-i18n="dropPrompt"></span>
                  </span>
                  <span id="gallery-cover-name" class="dz-file"></span>
                  <input id="gallery-cover" type="file" accept="image/png,image/jpeg" />
                </div>
                <p class="muted warn" data-i18n="stegoWarning"></p>
              </div>
            </div>

            <div id="stego-fields" hidden>
              <div id="cover-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
                <svg
                  class="dz-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="3" y="4" width="18" height="16" rx="2" />
                  <circle cx="8.5" cy="9.5" r="1.5" />
                  <path d="m4 18 5-5 4 4 3-3 4 4" />
                </svg>
                <span class="dz-prompt">
                  <span class="dz-title" data-i18n="coverTitle"></span><br />
                  <span class="muted" data-i18n="dropPrompt"></span>
                </span>
                <span id="cover-dz-file" class="dz-file"></span>
                <input id="cover-file" type="file" accept="image/png,image/jpeg" />
              </div>
              <p class="muted warn" data-i18n="stegoWarning"></p>
            </div>

            <label id="add-band-label" class="checkbox"
              ><input id="add-band" type="checkbox" /> <span data-i18n="labelAddBand"></span
            ></label>
            <div id="band-fields" hidden>
              <input id="band-title" type="text" data-i18n-placeholder="titlePlaceholder" />
              <p class="muted warn" data-i18n="bandWarning"></p>
            </div>

            <label id="zip-field" class="checkbox"
              ><input id="as-zip" type="checkbox" checked /> <span data-i18n="labelAsZip"></span
            ></label>

            <div id="paper-fields" hidden>
              <label class="checkbox"
                ><input id="add-instructions" type="checkbox" />
                <span data-i18n="labelInstructions"></span
              ></label>
              <label data-i18n="labelPasswordHint" for="pw-hint"></label>
              <input id="pw-hint" type="text" />
              <label data-i18n="labelKeyLocation" for="key-location"></label>
              <input id="key-location" type="text" />
              <p class="muted warn" data-i18n="paperCleartextWarn"></p>
            </div>
          </details>

          <button id="save-btn" class="btn-primary btn-lg" data-i18n="btnSave"></button>
          <p id="save-status" class="status" role="status"></p>
          <div id="save-result" class="result" hidden>
            <p class="result-title" data-i18n="savedTitle"></p>
            <p id="save-result-note" class="result-note"></p>
          </div>
        </section>

        <section class="card">
          <div class="card-head"><h2 data-i18n="restoreHeading"></h2></div>

          <fieldset class="segmented">
            <label
              ><input type="radio" name="restore-mode" value="standard" checked /><span
                data-i18n="restoreModeStandard"
              ></span
            ></label>
            <label
              ><input type="radio" name="restore-mode" value="gallery" /><span
                data-i18n="restoreModeGallery"
              ></span
            ></label>
          </fieldset>
          <p id="restore-gallery-hint" class="muted" data-i18n="galleryIntro" hidden></p>

          <div id="restore-drop" class="dropzone" tabindex="0" role="button">
            <svg
              class="dz-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 4v12M7 11l5 5 5-5" />
              <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3" />
            </svg>
            <span class="dz-prompt">
              <span class="dz-title" data-i18n="labelImagesOrZip"></span><br />
              <span class="muted" data-i18n="dropPrompt"></span>
            </span>
            <span id="restore-dz-file" class="dz-file"></span>
            <input
              id="restore-files"
              type="file"
              accept="image/*,.zip,.pdf,application/pdf"
              multiple
            />
          </div>

          <button id="camera-btn" class="btn-ghost camera-btn" hidden>
            <svg
              class="camera-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M4 8h3l2-3h6l2 3h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"
              />
              <circle cx="12" cy="13.5" r="3.5" />
            </svg>
            <span data-i18n="btnScanCamera"></span>
          </button>
          <p id="camera-captured" class="muted camera-captured" hidden></p>

          <input
            id="restore-pw"
            class="stack-gap"
            type="password"
            autocomplete="current-password"
            data-i18n-placeholder="labelPassword"
          />

          <details id="restore-advanced" class="advanced">
            <summary data-i18n="advancedOptions"></summary>
            <div id="key-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
              <svg
                class="dz-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="7.5" cy="15.5" r="3.5" />
                <path d="M10.2 12.8 20 3M15 8l3 3" />
              </svg>
              <span class="dz-prompt">
                <span class="dz-title" data-i18n="labelKeyFileOrImage"></span><br />
                <span class="muted" data-i18n="dropPrompt"></span>
              </span>
              <span id="key-dz-file" class="dz-file"></span>
              <input id="restore-key" type="file" accept=".key,image/png,image/jpeg" />
            </div>
            <p class="muted" data-i18n="keyFileHint"></p>
          </details>

          <button id="restore-btn" class="btn-primary btn-lg" data-i18n="btnRestore"></button>
          <p id="restore-status" class="status" role="status"></p>
          <div id="restore-result" class="result" hidden>
            <p class="result-title" data-i18n="restoredTitle"></p>
            <p id="restore-result-note" class="result-note"></p>
          </div>
        </section>

      </div>

      <footer class="app-footer muted">
        <a href="./privacy.html">Privacy</a> · <a href="./terms.html">Terms</a> ·
        <a href="https://github.com/dlamarre-dev/StegoShard">Source (MIT)</a>
      </footer>
    </main>

    <dialog id="camera-modal" class="modal camera-modal">
      <div class="modal-head">
        <h2 data-i18n="cameraTitle"></h2>
        <button id="camera-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div class="modal-body camera-body">
        <div class="camera-frame">
          <video id="camera-video" autoplay playsinline muted></video>
        </div>
        <p class="muted" data-i18n="cameraHint"></p>
        <p id="camera-count" class="status" role="status"></p>
        <button id="camera-done" class="btn-primary" data-i18n="cameraDone"></button>
      </div>
    </dialog>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
