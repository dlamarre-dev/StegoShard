<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StegoShard</title>
    <link rel="stylesheet" href="./ui.css" />
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <img class="logo" src="../icons/icon.svg" alt="" />
        <div>
          <div class="brand-name" data-i18n="extShortName">StegoShard</div>
          <div class="brand-tag muted" data-i18n="popupTagline"></div>
        </div>
      </div>
      <div class="appbar-actions">
        <span id="state-pill" class="pill" role="status" aria-live="polite" hidden></span>
        <button id="workflows-btn" class="btn-ghost" data-i18n="btnWorkflows" hidden></button>
        <button id="settings-btn" class="btn-ghost" data-i18n="btnOpenOptions"></button>
      </div>
    </header>

    <main class="app">
      <!-- No key set up yet -->
      <section id="no-key" class="card banner" hidden>
        <h2 data-i18n="noKeyTitle"></h2>
        <p class="lead" data-i18n="noKeyBody"></p>
        <button id="open-options" class="btn-primary" data-i18n="btnOpenOptions"></button>
      </section>

      <!-- Locked -->
      <section id="locked" class="card banner" hidden>
        <h2 data-i18n="unlockHeading"></h2>
        <p class="lead" data-i18n="unlockPrompt"></p>
        <div class="field-row">
          <input
            id="unlock-pw"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button id="unlock-btn" class="btn-primary" data-i18n="btnUnlock"></button>
        </div>
        <p id="unlock-status" class="status" role="status"></p>
      </section>

      <!-- Launch chooser: pick a workflow (shown once unlocked). -->
      <section id="chooser" class="card banner" hidden>
        <h2 data-i18n="chooserTitle"></h2>
        <p class="lead" data-i18n="chooserBody"></p>
        <div class="chooser-grid">
          <button id="choose-guided" class="chooser-card" type="button">
            <span class="chooser-card-title" data-i18n="workflowGuided"></span>
            <span class="chooser-card-desc muted" data-i18n="workflowGuidedDesc"></span>
            <span id="rec-guided" class="pill pill-ok" data-i18n="workflowRecommended" hidden></span>
          </button>
          <button id="choose-expert" class="chooser-card" type="button">
            <span class="chooser-card-title" data-i18n="workflowExpert"></span>
            <span class="chooser-card-desc muted" data-i18n="workflowExpertDesc"></span>
            <span id="rec-expert" class="pill pill-ok" data-i18n="workflowRecommended" hidden></span>
          </button>
        </div>
      </section>

      <!-- Guided workflow mounts here. -->
      <div id="wizard-root" hidden></div>

      <div id="expert-view" class="grid" hidden>
        <!-- Unlocked: save -->
        <section id="save" class="card" hidden>
          <div class="card-head">
            <h2 data-i18n="saveHeading"></h2>
            <button id="lock-btn" class="linklike" data-i18n="btnLock"></button>
          </div>

          <div id="file-drop" class="dropzone" tabindex="0" role="button">
            <svg
              class="dz-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 16V4M7 9l5-5 5 5" />
              <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3" />
            </svg>
            <span class="dz-prompt">
              <span class="dz-title" data-i18n="dropTitle"></span><br />
              <span class="muted" data-i18n="dropPrompt"></span>
            </span>
            <span id="dz-file" class="dz-file"></span>
            <input id="save-file" type="file" />
          </div>
          <p id="size-line" class="muted estimate-line">
            <span data-i18n="labelFileSize"></span> <span id="save-size" class="badge">—</span>
          </p>

          <div class="advanced-static">
            <label class="muted" data-i18n="destHeading"></label>
            <fieldset class="segmented">
              <label
                ><input type="radio" name="dest" value="disk" checked /><span
                  data-i18n="destDisk"
                ></span
              ></label>
              <label
                ><input type="radio" name="dest" value="paper" /><span data-i18n="destPaper"></span
              ></label>
              <label
                ><input type="radio" name="dest" value="binary" /><span
                  data-i18n="destBinary"
                ></span
              ></label>
              <label
                ><input type="radio" name="dest" value="sqlite" /><span
                  data-i18n="destSqlite"
                ></span
                ><span class="mode-badge mode-badge--deniable" data-i18n="badgeDeniable"></span
              ></label>
              <label id="dest-cloud-label" hidden
                ><input type="radio" name="dest" value="cloud" /><span data-i18n="destCloud"></span
              ></label>
              <label
                ><input type="radio" name="dest" value="gallery" /><span
                  data-i18n="destGallery"
                ></span
                ><span class="mode-badge mode-badge--deniable" data-i18n="badgeDeniable"></span
              ></label>
            </fieldset>
            <p class="muted mode-legend" data-i18n="modeLegend"></p>
            <p id="estimate-line" class="muted estimate-line">
              <span data-i18n="estimateFiles"></span> <span id="estimate" class="badge">—</span>
            </p>
            <p id="no-format" class="status error" hidden></p>
            <p id="cloud-note" class="muted" data-i18n="cloudNote" hidden></p>
            <p id="size-warn" class="muted warn" hidden></p>

            <div id="keymode-fields">
              <label class="muted" data-i18n="keyModeHeading"></label>
              <fieldset class="segmented">
                <label
                  ><input type="radio" name="keymode" value="embedded" checked /><span
                    data-i18n="keyModeEmbedded"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="keymode" value="keyfile" /><span
                    data-i18n="keyModeKeyfile"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="keymode" value="stego" /><span
                    data-i18n="keyModeStego"
                  ></span
                ></label>
              </fieldset>
              <details class="why">
                <summary data-i18n="whyLabel"></summary>
                <p data-i18n="keyModeHelp"></p>
              </details>
            </div>

            <div id="gallery-fields" hidden>
              <p class="muted" data-i18n="galleryIntro"></p>
              <div id="gallery-covers-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
                <span class="dz-prompt">
                  <span class="dz-title" data-i18n="galleryCoversTitle"></span><br />
                  <span class="muted" data-i18n="dropPrompt"></span>
                </span>
                <span id="gallery-covers-name" class="dz-file"></span>
                <input id="gallery-covers" type="file" accept="image/png,image/jpeg" multiple />
              </div>
              <label class="stack-gap" data-i18n="labelStegoPassword" for="gallery-save-pw"></label>
              <input id="gallery-save-pw" type="password" autocomplete="new-password" />

              <label class="muted" data-i18n="keyModeHeading"></label>
              <fieldset class="segmented">
                <label
                  ><input type="radio" name="gallery-keymode" value="embedded" checked /><span
                    data-i18n="keyModeEmbedded"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="gallery-keymode" value="keyfile" /><span
                    data-i18n="keyModeKeyfile"
                  ></span
                ></label>
                <label
                  ><input type="radio" name="gallery-keymode" value="stego" /><span
                    data-i18n="keyModeStego"
                  ></span
                ></label>
              </fieldset>
              <div id="gallery-stego-fields" hidden>
                <div id="gallery-cover-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
                  <span class="dz-prompt">
                    <span class="dz-title" data-i18n="coverTitle"></span><br />
                    <span class="muted" data-i18n="dropPrompt"></span>
                  </span>
                  <span id="gallery-cover-name" class="dz-file"></span>
                  <input id="gallery-cover" type="file" accept="image/png,image/jpeg" />
                </div>
                <p class="muted warn" data-i18n="stegoWarning"></p>
              </div>
            </div>

            <div id="stego-fields" hidden>
              <div id="cover-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
                <svg
                  class="dz-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="3" y="4" width="18" height="16" rx="2" />
                  <circle cx="8.5" cy="9.5" r="1.5" />
                  <path d="m4 18 5-5 4 4 3-3 4 4" />
                </svg>
                <span class="dz-prompt">
                  <span class="dz-title" data-i18n="coverTitle"></span><br />
                  <span class="muted" data-i18n="dropPrompt"></span>
                </span>
                <span id="cover-dz-file" class="dz-file"></span>
                <input id="cover-file" type="file" accept="image/png,image/jpeg" />
              </div>
              <label data-i18n="labelStegoPassword" for="stego-pw"></label>
              <input id="stego-pw" type="password" autocomplete="current-password" />
              <p class="muted warn" data-i18n="stegoWarning"></p>
            </div>

            <label id="add-band-label" class="checkbox"
              ><input id="add-band" type="checkbox" /> <span data-i18n="labelAddBand"></span
            ></label>
            <div id="band-fields" hidden>
              <input id="band-title" type="text" data-i18n-placeholder="titlePlaceholder" />
              <p class="muted warn" data-i18n="bandWarning"></p>
            </div>

            <label id="zip-field" class="checkbox"
              ><input id="as-zip" type="checkbox" checked /> <span data-i18n="labelAsZip"></span
            ></label>

            <div id="paper-fields" hidden>
              <label class="checkbox"
                ><input id="add-instructions" type="checkbox" />
                <span data-i18n="labelInstructions"></span
              ></label>
              <label data-i18n="labelPasswordHint" for="pw-hint"></label>
              <input id="pw-hint" type="text" />
              <label data-i18n="labelKeyLocation" for="key-location"></label>
              <input id="key-location" type="text" />
              <p class="muted warn" data-i18n="paperCleartextWarn"></p>
            </div>
          </div>

          <button id="save-btn" class="btn-primary btn-lg" data-i18n="btnSave"></button>
          <p id="save-status" class="status" role="status"></p>
          <div id="save-result" class="result" hidden>
            <p class="result-title" data-i18n="savedTitle"></p>
            <p id="save-result-note" class="result-note"></p>
            <div id="save-recovery" class="result-recovery"></div>
          </div>
        </section>

        <!-- Restore (independent of the managed key) -->
        <section id="restore" class="card">
          <div class="card-head"><h2 data-i18n="restoreHeading"></h2></div>

          <fieldset class="segmented">
            <label
              ><input type="radio" name="restore-mode" value="standard" checked /><span
                data-i18n="restoreModeStandard"
              ></span
            ></label>
            <label
              ><input type="radio" name="restore-mode" value="gallery" /><span
                data-i18n="restoreModeGallery"
              ></span
            ></label>
          </fieldset>
          <p id="restore-gallery-hint" class="muted" data-i18n="galleryIntro" hidden></p>

          <div id="restore-drop" class="dropzone" tabindex="0" role="button">
            <svg
              class="dz-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 4v12M7 11l5 5 5-5" />
              <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3" />
            </svg>
            <span class="dz-prompt">
              <span class="dz-title" data-i18n="labelImagesOrZip"></span><br />
              <span class="muted" data-i18n="dropPrompt"></span>
            </span>
            <span id="restore-dz-file" class="dz-file"></span>
            <input
              id="restore-files"
              type="file"
              accept="image/*,.zip,.pdf,application/pdf"
              multiple
            />
          </div>

          <input
            id="restore-pw"
            class="stack-gap"
            type="password"
            autocomplete="current-password"
            data-i18n-placeholder="labelPassword"
          />

          <div id="restore-advanced" class="advanced-static">
            <div id="key-drop" class="dropzone dropzone-sm" tabindex="0" role="button">
              <svg
                class="dz-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="7.5" cy="15.5" r="3.5" />
                <path d="M10.2 12.8 20 3M15 8l3 3" />
              </svg>
              <span class="dz-prompt">
                <span class="dz-title" data-i18n="labelKeyFileOrImage"></span><br />
                <span class="muted" data-i18n="dropPrompt"></span>
              </span>
              <span id="key-dz-file" class="dz-file"></span>
              <input id="restore-key" type="file" accept=".key,image/png,image/jpeg" />
            </div>
            <p class="muted" data-i18n="keyFileHint"></p>
          </div>

          <button id="restore-btn" class="btn-primary btn-lg" data-i18n="btnRestore"></button>
          <button
            id="restore-photos-btn"
            class="btn-secondary"
            data-i18n="btnRestorePhotos"
            hidden
          ></button>
          <p id="restore-status" class="status" role="status"></p>
          <div id="restore-result" class="result" hidden>
            <p class="result-title" data-i18n="restoredTitle"></p>
            <p id="restore-result-note" class="result-note"></p>
          </div>
        </section>

      </div>

      <footer class="app-footer muted">
        <button id="footer-options" class="linklike" data-i18n="btnOpenOptions"></button>
      </footer>
    </main>

    <!-- Settings overlay: key management, shown over the dimmed app. -->
    <dialog id="settings-modal" class="modal" aria-labelledby="settings-title">
      <div class="modal-head">
        <h2 id="settings-title" data-i18n="optionsTitle"></h2>
        <button id="settings-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <section class="card">
          <div class="card-head"><h2 data-i18n="optKeyHeading"></h2></div>
          <p id="key-body-new" class="muted" data-i18n="optKeyBodyNew" hidden></p>
          <p id="key-body-exists" class="muted" data-i18n="optKeyBodyExists" hidden></p>
          <div id="create-fields" hidden>
            <label data-i18n="labelNewPassword" for="new-pw"></label>
            <input id="new-pw" type="password" autocomplete="new-password" />
            <div class="pw-row">
              <p id="new-pw-strength" class="muted pw-meter-label" aria-live="polite"></p>
              <button id="new-pw-gen" type="button" class="btn-link" data-i18n="pwGenerate"></button>
            </div>
            <label data-i18n="labelConfirmPassword" for="confirm-pw"></label>
            <input id="confirm-pw" type="password" autocomplete="new-password" />
            <p class="muted warn" data-i18n="passwordHint"></p>
            <button id="create-btn" class="btn-primary" data-i18n="btnCreateKey"></button>
            <p id="create-status" class="status" role="status"></p>
          </div>
        </section>

        <div id="manage" hidden>
          <section class="card">
            <div class="card-head"><h2 data-i18n="changePwHeading"></h2></div>
            <label data-i18n="labelOldPassword" for="old-pw"></label>
            <input id="old-pw" type="password" autocomplete="current-password" />
            <label data-i18n="labelNewPassword" for="change-new-pw"></label>
            <input id="change-new-pw" type="password" autocomplete="new-password" />
            <label data-i18n="labelConfirmPassword" for="change-confirm-pw"></label>
            <input id="change-confirm-pw" type="password" autocomplete="new-password" />
            <button id="change-btn" class="btn-primary" data-i18n="btnChangePw"></button>
            <p id="change-status" class="status" role="status"></p>
          </section>

          <section class="card">
            <div class="card-head"><h2 data-i18n="exportHeading"></h2></div>
            <p class="muted" data-i18n="exportBody"></p>
            <button id="export-btn" class="btn-secondary" data-i18n="btnExportKey"></button>
            <p id="export-status" class="status" role="status"></p>
          </section>

          <section class="card">
            <div class="card-head"><h2 data-i18n="eraseHeading"></h2></div>
            <p class="muted warn" data-i18n="eraseBody"></p>
            <button id="erase-btn" class="btn-primary danger" data-i18n="btnEraseKey"></button>
            <p id="erase-status" class="status" role="status"></p>
          </section>
        </div>

        <section class="card">
          <div class="card-head"><h2 data-i18n="importHeading"></h2></div>
          <p class="muted" data-i18n="importBody"></p>
          <label data-i18n="labelKeyFile" for="import-key"></label>
          <input id="import-key" type="file" accept=".key" />
          <label data-i18n="labelPassword" for="import-pw"></label>
          <input id="import-pw" type="password" autocomplete="current-password" />
          <button id="import-btn" class="btn-secondary" data-i18n="btnImportKey"></button>
          <p id="import-status" class="status" role="status"></p>
        </section>
      </div>
    </dialog>

    <script type="module" src="./app.ts"></script>
  </body>
</html>
