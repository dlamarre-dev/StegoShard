<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ImageVault — Google Photos</title>
    <link rel="stylesheet" href="./ui.css" />
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">IV</span>
        <div class="brand-name" data-i18n="photosHeading"></div>
      </div>
    </header>

    <main class="app">
      <section class="card">
        <p class="muted" data-i18n="photosIntro"></p>

        <label data-i18n="labelKeyFile" for="photos-key"></label>
        <input id="photos-key" type="file" accept=".key" />
        <p class="muted" data-i18n="keyFileHint"></p>

        <label data-i18n="labelPassword" for="photos-pw"></label>
        <input id="photos-pw" type="password" autocomplete="current-password" />

        <button id="photos-restore-btn" class="btn-primary" data-i18n="btnRestorePhotos"></button>
        <p id="photos-status" class="status" role="status"></p>
      </section>
    </main>
    <script type="module" src="./photos.ts"></script>
  </body>
</html>
