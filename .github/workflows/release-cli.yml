name: Release CLI binaries

# Standalone, self-contained StegoShard CLI executables via `deno compile`,
# built from the pre-bundled dist-cli/stegoshard.js (all npm deps already inlined
# by vite, so Deno resolves nothing at compile time). The permission flags baked
# in mean the binary can read/write files but has NO network access — the
# "nothing leaves your device" guarantee, enforced by the runtime.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: stegoshard-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: stegoshard-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: stegoshard-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build the bundled CLI
        run: npm run build:cli
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile standalone binary
        run: >
          deno compile --allow-read --allow-write --allow-env --no-prompt
          --target ${{ matrix.target }}
          --output ${{ matrix.name }}
          dist-cli/stegoshard.js
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
