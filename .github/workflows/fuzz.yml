name: Fuzz

# Deep parser fuzzing off the PR critical path: nightly, plus on demand. The
# seed comes from the run id so coverage accumulates over time; a regression
# (a non-Error throw, hang, or crash in a parser) fails the run.
on:
  schedule:
    - cron: '27 4 * * *' # nightly, 04:27 UTC
  workflow_dispatch:
    inputs:
      iters:
        description: 'Iterations per target'
        default: '200000'

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Parser fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fuzz parsers
        run: npm run fuzz -- --iters=${{ github.event.inputs.iters || '200000' }} --seed=${{ github.run_id }}
