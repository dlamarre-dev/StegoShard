name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build (Chrome/Edge)
        run: npm run build

      - name: Build (Firefox)
        run: npm run build:firefox

      - name: Build (web app)
        run: npm run build:web

      - name: Build (CLI)
        run: npm run build:cli

      - name: CLI smoke test (Deno)
        run: |
          curl -fsSL https://deno.land/install.sh | sh -s v2.1.4
          export PATH="$HOME/.deno/bin:$PATH"
          echo "deno smoke: save + restore a vault with the bundled CLI" > /tmp/iv-secret.txt
          IMAGEVAULT_PASSWORD=ci-pass deno run --allow-read --allow-write --allow-env \
            dist-cli/imagevault.js save /tmp/iv-secret.txt --out /tmp/iv-out
          IMAGEVAULT_PASSWORD=ci-pass deno run --allow-read --allow-write --allow-env \
            dist-cli/imagevault.js restore /tmp/iv-out --out /tmp/iv-restored
          diff /tmp/iv-secret.txt /tmp/iv-restored/iv-secret.txt
          echo "Deno round-trip OK"

  conformance:
    name: Python decoder conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Generate fixtures (extension encodes)
        run: npm run fixtures -- python/tests/_fixtures

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Conformance test (Python decodes)
        run: pytest python -q
