name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build (Chrome/Edge)
        run: npm run build

      - name: Build (Firefox)
        run: npm run build:firefox

      - name: Build (web app)
        run: npm run build:web

  conformance:
    name: Python decoder conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Generate fixtures (extension encodes)
        run: npm run fixtures -- python/tests/_fixtures

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Conformance test (Python decodes)
        run: pytest python -q
