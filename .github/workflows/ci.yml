name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      # Quick fixed-seed parser fuzz smoke; the deep nightly run is fuzz.yml.
      - name: Fuzz smoke (parsers)
        run: npm run fuzz -- --iters=2000 --seed=1

      - name: Build (Chrome/Edge)
        run: npm run build

      - name: Build (Firefox)
        run: npm run build:firefox

      - name: Build (web app)
        run: npm run build:web

      - name: Build (CLI)
        run: npm run build:cli

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.4

      - name: CLI smoke test (Deno)
        run: |
          echo "deno smoke: save + restore a vault with the bundled CLI" > /tmp/ss-secret.txt
          STEGOSHARD_PASSWORD=ci-pass deno run --allow-read --allow-write --allow-env \
            dist-cli/stegoshard.js save /tmp/ss-secret.txt --out /tmp/ss-out
          STEGOSHARD_PASSWORD=ci-pass deno run --allow-read --allow-write --allow-env \
            dist-cli/stegoshard.js restore /tmp/ss-out --out /tmp/ss-restored
          diff /tmp/ss-secret.txt /tmp/ss-restored/ss-secret.txt
          echo "Deno round-trip OK"

  crypto-scan:
    name: Post-quantum crypto scan (QRAMM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install QRAMM scanners
        run: |
          go install github.com/csnp/cryptoscan/cmd/cryptoscan@v1.3.0
          go install github.com/csnp/qramm-cryptodeps/cmd/cryptodeps@v1.2.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Source scan. Auto-detects .cryptoscan.yaml (failOn: high + documented false-positive
      # suppressions), so this fails only if a *new* HIGH/CRITICAL algorithm is introduced.
      - name: cryptoscan — gate on new weak/quantum-vulnerable crypto
        run: cryptoscan scan .

      # Cryptographic Bill of Materials, uploaded as a build artifact (not committed —
      # it tracks dependency capabilities and would drift).
      - name: cryptoscan — generate CBOM
        run: cryptoscan scan . --format cbom --output crypto-bom.json

      # Dependency view. Capability-based for npm/pypi (reachability is Go-only), so it
      # over-reports what libraries *can* do (hash-wasm→MD5/SHA-1, cryptography→RSA) vs
      # what StegoShard actually uses (Argon2id, AES-256-GCM). Informational only.
      - name: cryptodeps — dependency report (informational)
        run: cryptodeps analyze . --fail-on none

      - name: Upload CBOM
        uses: actions/upload-artifact@v7
        with:
          name: crypto-bom
          path: crypto-bom.json

  conformance:
    name: Python decoder conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Generate fixtures (extension encodes)
        run: npm run fixtures -- python/tests/_fixtures

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Conformance test (Python decodes)
        run: pytest python -q
